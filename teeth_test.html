<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>양치 미니게임 테스트</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d0d1c;
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  touch-action:none; user-select:none;
}
.wrap { width:390px; background:#13132a; border-radius:20px; overflow:hidden; }
canvas { display:block; width:390px; }
.bottom-ui {
  padding:12px 20px 18px;
  display:flex; align-items:center; justify-content:space-between;
  min-height:58px;
}
.info { font-size:11px; color:#444; letter-spacing:0.04em; }
.tool-btn {
  font-size:24px; padding:8px 14px; border-radius:12px;
  border:2px solid rgba(200,168,130,0.15);
  background:rgba(200,168,130,0.07);
  cursor:pointer; transition:all 0.15s;
}
.tool-btn.active { border-color:#c8a870; background:rgba(200,168,130,0.22); transform:scale(1.06); }
.exit-btn {
  font-size:11px; color:#555; padding:8px 18px;
  border:1px solid #2a2a4a; border-radius:20px;
  background:transparent; cursor:pointer;
}
.exit-btn:active { color:#888; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="c" width="390" height="500"></canvas>
  <div class="bottom-ui">
    <div class="info" id="info"></div>
    <button class="tool-btn" id="toolBtn">🪥</button>
    <button class="exit-btn" id="exitBtn">양치 끝내기</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W=390, H=500;

// ══════════════════════════════════════════
//  치아 구역 정의 (옆면 뷰 — 왼쪽=앞, 오른쪽=뒤)
//  importance: 0=낮음, 1=보통, 2=높음(열육치)
// ══════════════════════════════════════════
const ZONES = [
  // ── 윗니 ──
  { id:'u_incisor', name:'윗 앞니',   x:52,  y:148, w:65,  h:52, importance:0, row:'upper' },
  { id:'u_canine',  name:'송곳니',    x:117, y:138, w:38,  h:68, importance:1, row:'upper' },
  { id:'u_pre',     name:'앞어금니', x:155, y:148, w:78,  h:56, importance:1, row:'upper' },
  { id:'u_carnas',  name:'열육치',   x:233, y:144, w:80,  h:60, importance:2, row:'upper' },
  // ── 아랫니 ──
  { id:'l_incisor', name:'아랫 앞니', x:52,  y:298, w:68,  h:48, importance:0, row:'lower' },
  { id:'l_canine',  name:'송곳니',    x:120, y:294, w:35,  h:55, importance:1, row:'lower' },
  { id:'l_pre',     name:'앞어금니', x:155, y:294, w:72,  h:54, importance:1, row:'lower' },
  { id:'l_carnas',  name:'열육치',   x:227, y:290, w:78,  h:58, importance:2, row:'lower' },
];
ZONES.forEach(z=>{ z.coverage=0; z.foamDots=[]; });

// ══════════════════════════════════════════
//  게임 상태
// ══════════════════════════════════════════
let toolActive  = false;
let isDragging  = false;
let lastX=-1, lastY=-1;
let totalStrokes = 0;
let sessionEnded = false;
let eventActive  = false;
let eventResult  = null; // null | 'struggle' | 'give_up'

// ══════════════════════════════════════════
//  치아 그리기
// ══════════════════════════════════════════
function drawMouth() {
  // ── 배경 (구강 내부) ──
  ctx.fillStyle='#1a1028';
  ctx.fillRect(0,0,W,H);

  // 혀
  ctx.beginPath();
  ctx.ellipse(175, 275, 130, 45, 0, 0, Math.PI*2);
  ctx.fillStyle='#5a2a38'; ctx.fill();

  // 구강 상단 천장
  ctx.beginPath();
  ctx.roundRect(40, 80, 290, 90, [0,0,30,30]);
  ctx.fillStyle='#3a1e2e'; ctx.fill();

  // 구강 하단 바닥
  ctx.beginPath();
  ctx.roundRect(40, 340, 290, 80, [30,30,0,0]);
  ctx.fillStyle='#3a1e2e'; ctx.fill();

  // 잇몸 상단
  ctx.beginPath();
  ctx.roundRect(44, 130, 282, 30, [0,0,10,10]);
  ctx.fillStyle='#8a3848'; ctx.fill();

  // 잇몸 하단
  ctx.beginPath();
  ctx.roundRect(44, 342, 282, 24, [10,10,0,0]);
  ctx.fillStyle='#8a3848'; ctx.fill();

  // 방향 라벨
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.font='10px Apple SD Gothic Neo,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('앞 →', 46, 122);
  ctx.textAlign='right';
  ctx.fillText('← 뒤', 342, 122);

  // ── 치아 구역 그리기 ──
  ZONES.forEach(z => drawZone(z));
}

function drawZone(z) {
  const cov = z.coverage;

  // 치아 색상 (황색→흰색으로 변화)
  const yellow = Math.max(0, 1 - cov/80);
  const r = Math.round(245 - yellow*40);
  const g = Math.round(245 - yellow*60);
  const b = Math.round(220 - yellow*30);
  ctx.fillStyle = `rgb(${r},${g},${b})`;

  // 치아 모양 (구역별 세부 형태)
  if(z.id==='u_canine') {
    // 송곳니 — 뾰족한 삼각형+직사각형
    ctx.beginPath();
    ctx.roundRect(z.x, z.y, z.w, z.h-20, [4,4,0,0]);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(z.x+4, z.y+z.h-20);
    ctx.lineTo(z.x+z.w-4, z.y+z.h-20);
    ctx.lineTo(z.x+z.w/2, z.y+z.h+2);
    ctx.closePath();
    ctx.fill();
  } else if(z.id==='l_canine') {
    ctx.beginPath();
    ctx.roundRect(z.x, z.y+20, z.w, z.h-20, [0,0,4,4]);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(z.x+3, z.y+20);
    ctx.lineTo(z.x+z.w-3, z.y+20);
    ctx.lineTo(z.x+z.w/2, z.y-2);
    ctx.closePath();
    ctx.fill();
  } else if(z.row==='upper') {
    ctx.beginPath();
    ctx.roundRect(z.x, z.y, z.w, z.h, [4,4,12,12]);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.roundRect(z.x, z.y, z.w, z.h, [12,12,4,4]);
    ctx.fill();
  }

  // 중요도 표시 (열육치 강조 테두리)
  if(z.importance===2 && cov<60) {
    const pulse = 0.15 + 0.1*Math.sin(Date.now()/600);
    ctx.strokeStyle=`rgba(220,160,60,${pulse + (cov<30?0.15:0)})`;
    ctx.lineWidth=2;
    if(z.row==='upper') {
      ctx.beginPath(); ctx.roundRect(z.x,z.y,z.w,z.h,[4,4,12,12]); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.roundRect(z.x,z.y,z.w,z.h,[12,12,4,4]); ctx.stroke();
    }
  }

  // 커버리지 오버레이 (닦인 흔적)
  if(cov>0) {
    ctx.save();
    if(z.row==='upper'){
      ctx.beginPath(); ctx.roundRect(z.x,z.y,z.w,z.h,[4,4,12,12]); ctx.clip();
    } else {
      ctx.beginPath(); ctx.roundRect(z.x,z.y,z.w,z.h,[12,12,4,4]); ctx.clip();
    }
    // 거품 점들
    z.foamDots.forEach(d=>{
      ctx.globalAlpha = d.a * (cov/100) * 0.7;
      ctx.fillStyle='rgba(200,230,255,1)';
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha=1;
    ctx.restore();
  }

  // 이름 라벨 (중요 구역만 상시 표시, 나머지는 호버 시)
  if(z.importance===2) {
    ctx.fillStyle='rgba(220,160,60,0.7)';
    ctx.font='9px Apple SD Gothic Neo,sans-serif';
    ctx.textAlign='center';
    ctx.fillText(z.name, z.x+z.w/2, z.row==='upper'? z.y-6 : z.y+z.h+14);
  }
}

// ══════════════════════════════════════════
//  커버리지 바 (오른쪽 패널)
// ══════════════════════════════════════════
function drawCoverageBars() {
  const barZones = [
    { label:'윗 앞니',   ids:['u_incisor'] },
    { label:'송곳니',    ids:['u_canine','l_canine'] },
    { label:'앞어금니', ids:['u_pre','l_pre'] },
    { label:'열육치 ★', ids:['u_carnas','l_carnas'], important:true },
  ];

  const startX = 316, startY = 148, barW = 52, barH = 10, gap = 36;

  barZones.forEach((group, i)=>{
    const y = startY + i*gap;
    const avg = group.ids.reduce((s,id)=>{
      const z=ZONES.find(z=>z.id===id); return s+(z?z.coverage:0);
    },0) / group.ids.length;

    // 라벨
    ctx.fillStyle = group.important ? 'rgba(220,160,60,0.75)' : 'rgba(255,255,255,0.25)';
    ctx.font = `${group.important?'bold ':''} 9px Apple SD Gothic Neo,sans-serif`;
    ctx.textAlign='left';
    ctx.fillText(group.label, startX, y-3);

    // 배경
    ctx.fillStyle='rgba(255,255,255,0.07)';
    ctx.beginPath(); ctx.roundRect(startX, y, barW, barH, 4); ctx.fill();

    // 채움
    const fillW = (avg/100)*barW;
    if(fillW>0) {
      const col = avg>70 ? '#7ac890' : avg>35 ? '#c8a870' : '#c85868';
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.roundRect(startX, y, fillW, barH, 4); ctx.fill();
    }
  });
}

// ══════════════════════════════════════════
//  이벤트 오버레이 (도망/발버둥)
// ══════════════════════════════════════════
const EVENT_CHOICES = [
  { text:'살살 달래며 계속', type:'calm' },
  { text:'간식으로 유도',    type:'snack' },
  { text:'억지로 잡고 계속', type:'force' },
  { text:'오늘은 포기',       type:'quit' },
];

function drawEventOverlay() {
  // 배경 어둡게
  ctx.fillStyle='rgba(10,8,22,0.88)';
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.font='bold 15px Apple SD Gothic Neo,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('고양이가 발버둥쳐요 😾', W/2, 110);

  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.font='11px Apple SD Gothic Neo,sans-serif';
  ctx.fillText('어떻게 할까요?', W/2, 135);

  EVENT_CHOICES.forEach((c,i)=>{
    const y = 168 + i*72;
    const hovered = false;
    // 카드
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.strokeStyle='rgba(255,255,255,0.12)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(24, y, W-48, 58, 10); ctx.fill(); ctx.stroke();

    // 번호
    ctx.fillStyle='rgba(200,168,130,0.6)';
    ctx.font='bold 13px Apple SD Gothic Neo,sans-serif';
    ctx.textAlign='left';
    ctx.fillText(`${i+1}`, 40, y+24);

    // 텍스트
    ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.font='13px Apple SD Gothic Neo,sans-serif';
    ctx.fillText(c.text, 58, y+33);
  });
}

// ══════════════════════════════════════════
//  메인 렌더
// ══════════════════════════════════════════
function render() {
  ctx.clearRect(0,0,W,H);
  drawMouth();
  drawCoverageBars();
  if(eventActive) drawEventOverlay();
  requestAnimationFrame(render);
}

// ══════════════════════════════════════════
//  브러싱 로직
// ══════════════════════════════════════════
function getZoneAt(x,y) {
  // 뒤에서 앞으로 체크 (겹치는 경우 작은 구역 우선)
  for(let i=ZONES.length-1;i>=0;i--){
    const z=ZONES[i];
    if(x>=z.x&&x<=z.x+z.w&&y>=z.y&&y<=z.y+z.h) return z;
  }
  return null;
}

function brush(x,y) {
  if(!toolActive||sessionEnded||eventActive) return;
  const dist=Math.hypot(x-lastX,y-lastY);
  if(dist<5&&lastX!==-1) return;
  lastX=x; lastY=y;

  const z=getZoneAt(x,y);
  if(!z) return;

  const gain = z.importance===2 ? 2.5 : z.importance===1 ? 3.5 : 4;
  z.coverage = Math.min(100, z.coverage+gain);
  totalStrokes++;

  // 거품 점 추가
  if(z.foamDots.length<80) {
    z.foamDots.push({
      x: x + (Math.random()-0.5)*10,
      y: y + (Math.random()-0.5)*10,
      r: 2+Math.random()*3.5,
      a: 0.4+Math.random()*0.5,
    });
  }

  // 도망/발버둥 이벤트 확률
  const backBonus = z.importance===2 ? 0.06 : 0;
  const chance    = 0.004 + backBonus + totalStrokes*0.00015;
  if(Math.random()<chance) triggerEvent();
}

// ══════════════════════════════════════════
//  이벤트 처리
// ══════════════════════════════════════════
function triggerEvent() {
  if(eventActive||sessionEnded) return;
  eventActive=true;
  toolActive=false;
  document.getElementById('toolBtn').classList.remove('active');
  updateInfo();
}

function handleEventChoice(idx) {
  const c=EVENT_CHOICES[idx];
  eventActive=false;

  if(c.type==='quit') {
    sessionEnded=true;
    updateInfo('오늘은 여기까지');
    return;
  }
  if(c.type==='force') {
    // 계속하지만 커버리지 약간 손실 (발버둥으로 흐트러짐)
    ZONES.forEach(z=>{ z.coverage=Math.max(0,z.coverage-8); });
  }
  // calm / snack → 그냥 재개
  toolActive=true;
  document.getElementById('toolBtn').classList.add('active');
  lastX=lastY=-1;
  updateInfo();
}

// ══════════════════════════════════════════
//  UI
// ══════════════════════════════════════════
function updateInfo(msg) {
  const el=document.getElementById('info');
  if(msg){ el.textContent=msg; return; }
  if(sessionEnded){ el.textContent='양치 종료'; return; }
  if(eventActive){ el.textContent=''; return; }
  // 중요 구역 커버리지 요약
  const imp=ZONES.filter(z=>z.importance===2);
  const avg=Math.round(imp.reduce((s,z)=>s+z.coverage,0)/imp.length);
  el.textContent = toolActive ? `열육치 ${avg}%` : '';
}

document.getElementById('toolBtn').addEventListener('click',()=>{
  if(sessionEnded||eventActive) return;
  toolActive=!toolActive;
  document.getElementById('toolBtn').classList.toggle('active',toolActive);
  if(!toolActive) lastX=lastY=-1;
  updateInfo();
});

document.getElementById('exitBtn').addEventListener('click',()=>{
  if(eventActive) return;
  sessionEnded=true;
  toolActive=false;
  document.getElementById('toolBtn').classList.remove('active');
  updateInfo();
  // 메인 연결 시 finishTeethGame() 예정
});

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const sx=W/r.width,sy=H/r.height;
  const pt=e.touches?e.touches[0]:e;
  return {x:(pt.clientX-r.left)*sx,y:(pt.clientY-r.top)*sy};
}

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const {x,y}=getPos(e);

  // 이벤트 선택지 탭
  if(eventActive){
    const choiceY0=168;
    for(let i=0;i<4;i++){
      const cy=choiceY0+i*72;
      if(x>=24&&x<=W-24&&y>=cy&&y<=cy+58){
        handleEventChoice(i); return;
      }
    }
    return;
  }

  isDragging=true; lastX=lastY=-1;
  brush(x,y);
},{passive:false});

canvas.addEventListener('pointermove',e=>{
  if(!isDragging) return;
  e.preventDefault();
  const {x,y}=getPos(e);
  brush(x,y);
},{passive:false});

window.addEventListener('pointerup',()=>{ isDragging=false; });

updateInfo();
render();
</script>
</body>
</html>
